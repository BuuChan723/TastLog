<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>工数タイマー</title>
    <meta name="theme-color" content="#0f8f83" />
    <meta name="apple-mobile-web-app-title" content="工数タイマー" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker">Task Log</p>
          <h1>工数タイマー</h1>
        </div>
        <button class="icon-button danger-text" id="resetData" type="button" title="全データ削除">
          <span aria-hidden="true">×</span>
          <span>リセット</span>
        </button>
      </header>

      <section class="main-grid" aria-label="工数タイマー">
        <section class="panel task-panel" aria-label="タスク操作">
          <form class="task-form" id="taskForm">
            <label for="taskName">タスク名</label>
            <div class="input-row">
              <input
                id="taskName"
                name="taskName"
                type="text"
                autocomplete="off"
                maxlength="80"
                placeholder="例: 企画書の作成"
              />
              <button class="primary-button" id="startButton" type="submit">
                <span aria-hidden="true">▶</span>
                <span>開始</span>
              </button>
            </div>
          </form>

          <div class="current-task" id="currentTask">
            <div class="timer-heading">
              <div>
                <p>計測中のタスク</p>
                <h2 id="currentTaskName">待機中</h2>
              </div>
              <time id="activeTimer" datetime="PT0S">00:00:00</time>
            </div>

            <div class="status-line">
              <span class="status-pill idle" id="activeStatus">未開始</span>
              <span id="startedAt">--</span>
            </div>

            <div class="quick-action-row">
              <button class="secondary-button" id="quickPauseButton" type="button" disabled>
                <span aria-hidden="true">Ⅱ</span>
                <span>中断</span>
              </button>
              <button class="complete-button" id="quickCompleteButton" type="button" disabled>
                <span aria-hidden="true">✓</span>
                <span>完了</span>
              </button>
            </div>

            <p class="switch-note">未完了タスクは下の一覧から切り替えできます。</p>
          </div>

          <section class="open-tasks-section" aria-label="未完了タスク">
            <div class="panel-title-row compact-title-row">
              <div>
                <p class="section-label">Open</p>
                <h2>未完了タスク</h2>
              </div>
              <strong id="openTaskCount">0件</strong>
            </div>
            <div class="open-task-list" id="openTaskList"></div>
          </section>
        </section>

        <section class="panel today-panel" aria-label="今日の工数">
          <div class="panel-title-row">
            <div>
              <p class="section-label">Today</p>
              <h2>今日の工数</h2>
            </div>
            <strong id="todayTotal">0分</strong>
          </div>

          <div class="metrics">
            <div>
              <span id="todayTaskCount">0</span>
              <p>タスク</p>
            </div>
            <div>
              <span id="todayCompletedCount">0</span>
              <p>完了</p>
            </div>
            <div>
              <span id="todayRunningCount">0</span>
              <p>未完了</p>
            </div>
          </div>

          <div class="list-area" id="todayBreakdown"></div>
        </section>

        <section class="panel calendar-panel" aria-label="カレンダー">
          <div class="calendar-header">
            <button class="square-button" id="prevMonth" type="button" title="前の月">
              <span aria-hidden="true">‹</span>
            </button>
            <h2 id="monthTitle">--</h2>
            <button class="square-button" id="nextMonth" type="button" title="次の月">
              <span aria-hidden="true">›</span>
            </button>
          </div>

          <div class="weekdays" aria-hidden="true">
            <span>月</span>
            <span>火</span>
            <span>水</span>
            <span>木</span>
            <span>金</span>
            <span>土</span>
            <span>日</span>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </section>

        <section class="panel detail-panel" aria-label="選択日の工数">
          <div class="panel-title-row">
            <div>
              <p class="section-label">Selected Day</p>
              <h2 id="selectedDateTitle">--</h2>
            </div>
            <strong id="selectedDateTotal">0分</strong>
          </div>
          <div class="list-area" id="selectedDayList"></div>
        </section>

        <section class="panel history-panel" aria-label="完了タスク">
          <div class="panel-title-row">
            <div>
              <p class="section-label">Done</p>
              <h2>完了タスク</h2>
            </div>
            <strong id="completedTotal">0件</strong>
          </div>
          <div class="list-area history-list" id="completedList"></div>
        </section>
      </section>
    </main>

    <template id="emptyTemplate">
      <p class="empty-state">記録はまだありません。</p>
    </template>

    <script src="app.js"></script>
  </body>
</html>
