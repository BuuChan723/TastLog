<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdownエディタ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">M</span>
        <div>
          <h1>Markdownエディタ</h1>
          <p>文章を選んで、ボタンで整える</p>
        </div>
      </div>
      <div class="document-info" aria-live="polite">
        <span id="charCount">0文字</span>
        <span id="lineCount">1行</span>
      </div>
    </header>

    <nav class="toolbar" aria-label="Markdown変換ツール">
      <details class="tool-menu">
        <summary title="見出しの種類を選びます">見出し</summary>
        <div class="tool-menu-panel">
          <button type="button" data-action="heading1" title="選択行を大見出しにします">大見出し</button>
          <button type="button" data-action="heading2" title="選択行を中見出しにします">中見出し</button>
          <button type="button" data-action="heading3" title="選択行を小見出しにします">小見出し</button>
          <button type="button" data-action="heading4" title="選択行をさらに小さい見出しにします">見出し4</button>
          <button type="button" data-action="heading5" title="選択行を小さな見出しにします">見出し5</button>
          <button type="button" data-action="heading6" title="選択行を最小見出しにします">見出し6</button>
        </div>
      </details>

      <details class="tool-menu">
        <summary title="リストの種類を選びます">リスト</summary>
        <div class="tool-menu-panel">
          <button type="button" data-action="bullet" title="選択行を箇条書きにします">箇条書き</button>
          <button type="button" data-action="numbered" title="選択行を番号付きリストにします">番号リスト</button>
          <button type="button" data-action="checklist" title="選択行をチェックリストにします">チェックリスト</button>
        </div>
      </details>

      <details class="tool-menu">
        <summary title="文字の見た目を整えます">文字装飾</summary>
        <div class="tool-menu-panel">
          <button type="button" data-action="bold" title="選択文字を太字にします">太字</button>
          <button type="button" data-action="italic" title="選択文字を斜体にします">斜体</button>
          <button type="button" data-action="boldItalic" title="選択文字を太字かつ斜体にします">太字斜体</button>
          <button type="button" data-action="strike" title="選択文字に取り消し線を付けます">取り消し線</button>
          <button type="button" data-action="inlineCode" title="選択文字を文中コードにします">文中コード</button>
        </div>
      </details>

      <details class="tool-menu">
        <summary title="文章のまとまりを整えます">ブロック</summary>
        <div class="tool-menu-panel">
          <button type="button" data-action="quote" title="選択行を引用にします">引用</button>
          <button type="button" data-action="code" title="選択範囲をコードブロックにします">コードブロック</button>
          <button type="button" data-action="htmlBlock" title="HTMLブロックのひな形を挿入します">HTMLブロック</button>
          <button type="button" data-action="lineBreak" title="Markdownの明示的な改行を挿入します">改行</button>
        </div>
      </details>

      <details class="tool-menu">
        <summary title="リンクや表などを挿入します">挿入</summary>
        <div class="tool-menu-panel">
          <button type="button" data-action="link" title="選択文字をリンク文字にします">リンク</button>
          <button type="button" data-action="image" title="画像のMarkdownを挿入します">画像</button>
          <button type="button" data-action="table" title="表のひな形を挿入します">表</button>
          <button type="button" data-action="footnote" title="脚注のひな形を挿入します">脚注</button>
          <button type="button" data-action="rule" title="区切り線を挿入します">区切り線</button>
        </div>
      </details>
    </nav>

    <main class="workspace">
      <section class="pane editor-pane" aria-labelledby="editorTitle">
        <div class="pane-header">
          <h2 id="editorTitle">Markdown編集欄</h2>
          <span id="selectionInfo">未選択</span>
        </div>
        <textarea id="editor" spellcheck="false" aria-label="Markdown編集欄"># サンプル文書

## 確認事項

- 内容を確認する
- 修正する
- 共有する

> 右側でプレビューを確認できます。
</textarea>
      </section>

      <section class="pane preview-pane" aria-labelledby="previewTitle">
        <div class="pane-header">
          <h2 id="previewTitle">リアルタイムプレビュー</h2>
          <span id="previewState">更新済み</span>
        </div>
        <article id="preview" class="preview-content" aria-live="polite"></article>
      </section>
    </main>

    <footer class="bottom-panel">
      <div class="action-row" aria-label="文書操作">
        <button type="button" id="saveBtn" title="Markdownファイルとして保存します">保存</button>
        <button type="button" id="tidyBtn" title="余分な空白や空行を整えます">整える</button>
      </div>

      <section class="check-panel" aria-labelledby="checkTitle">
        <div class="check-heading">
          <h2 id="checkTitle">補正結果・チェック結果</h2>
          <span id="checkBadge">確認中</span>
        </div>
        <ul id="checkList"></ul>
      </section>
    </footer>
  </div>

  <script src="script.js"></script>
</body>

</html>
